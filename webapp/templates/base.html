<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Tausendsassa{% endblock %} — Admin</title>
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <link rel="stylesheet" href="/static/tailwind.css" />
  <style>
    html { color-scheme: dark; }

    body {
      margin: 0;
      background: var(--color-bg, #0d0d0d);
      color: var(--color-text-2, #c3c2b7);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--color-surface, #1a1a19);
      border: 1px solid var(--color-border, rgba(255,255,255,0.08));
      border-radius: var(--radius, 10px);
      padding: 18px 20px;
      min-width: 0;
    }

    .badge-on  { background: color-mix(in srgb, var(--color-ok, #0ca30c) 15%, transparent);
                 color: var(--color-ok, #0ca30c);
                 border: 1px solid color-mix(in srgb, var(--color-ok, #0ca30c) 30%, transparent); }
    .badge-off { background: color-mix(in srgb, var(--color-bad, #d03b3b) 15%, transparent);
                 color: var(--color-bad, #d03b3b);
                 border: 1px solid color-mix(in srgb, var(--color-bad, #d03b3b) 30%, transparent); }
    .badge-warn{ background: color-mix(in srgb, var(--color-warn-fill, #fab219) 15%, transparent);
                 color: var(--color-warn-fill, #fab219);
                 border: 1px solid color-mix(in srgb, var(--color-warn-fill, #fab219) 30%, transparent); }
  </style>
</head>
<body class="h-full min-h-screen bg-bg">

{% if user is defined and user %}
<nav class="border-b border-border bg-surface px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="text-white font-semibold text-[15px] tracking-[-0.01em]">Tausendsassa</span>
    <span class="text-muted text-[13px] font-normal">Admin Panel</span>
  </div>
  <div class="flex items-center gap-4">
    {% if guild is defined %}
    <a href="/guilds" class="text-[13px] text-muted hover:text-text-2 transition-colors">← Server list</a>
    {% endif %}
    <div class="flex items-center gap-2">
      <img src="{{ user_avatar_url(user.id, user.avatar) }}" class="w-7 h-7 rounded-full" alt="" />
      <span class="text-[13px] text-text-2">{{ user.username }}</span>
      {% if user.is_owner %}
      <span class="text-xs px-1.5 py-0.5 rounded-md bg-discord/15 text-discord border border-discord/25">Owner</span>
      {% endif %}
    </div>
    <a href="/logout" class="text-[13px] text-muted hover:text-bad transition-colors">Logout</a>
  </div>
</nav>
{% endif %}

<main class="{% block main_class %}max-w-[1240px] mx-auto px-6 py-6{% endblock %}">
  {% block content %}{% endblock %}
</main>

<footer class="border-t border-border py-4 px-6 text-center text-xs text-muted">
  <a href="/privacy" class="hover:text-text-2 transition-colors">Privacy Policy</a>
  <span class="mx-2">·</span>
  <a href="/terms" class="hover:text-text-2 transition-colors">Terms of Service</a>
</footer>

</body>
</html>
