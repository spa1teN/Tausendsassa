<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ guild_name }} — Map</title>
  <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.19.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #2b2d31;
      border-bottom: 1px solid #3f4147;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    body.light header { background: #ffffffdd; border-color: #e0e0e0; backdrop-filter: blur(6px); }

    .guild-icon { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }
    .guild-icon-placeholder {
      width: 32px; height: 32px; border-radius: 8px;
      background: #5865F222; border: 1px solid #5865F244;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #5865F2; font-size: 13px;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #fff; transition: color 0.3s; }
    header .sub { font-size: 12px; color: #80848e; transition: color 0.3s; }
    body.light header h1 { color: #111; }
    body.light header .sub { color: #666; }
    header .spacer { flex: 1; }

    .pill {
      font-size: 11px; padding: 3px 9px; border-radius: 12px;
      background: #383a40; color: #80848e; border: 1px solid #3f4147;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    body.light .pill { background: #f0f0f0; color: #555; border-color: #ccc; }

    #mode-btn {
      background: #383a40; border: 1px solid #3f4147;
      color: #dbdee1; border-radius: 8px; padding: 4px 10px;
      font-size: 13px; cursor: pointer; transition: background 0.2s;
      white-space: nowrap;
    }
    #mode-btn:hover { background: #4e5058; }
    body.light #mode-btn { background: #f0f0f0; border-color: #ccc; color: #333; }

    /* ── Map ── */
    #map { flex: 1; background: radial-gradient(circle at 50% 42%, #131c34 0%, #070b16 68%); }

    /* ── Popup ── */
    .maplibregl-popup-content {
      background: #2b2d31 !important;
      border: 1px solid #3f4147 !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
      padding: 0 !important;
      color: #dbdee1;
    }
    body.light .maplibregl-popup-content {
      background: #fff !important;
      border-color: #e0e0e0 !important;
    }
    .maplibregl-popup-tip { display: none; }
    .maplibregl-popup-close-button { color: #80848e !important; font-size: 16px !important; top: 6px !important; right: 8px !important; }
    .pop-inner { display: flex; align-items: center; gap: 10px; padding: 10px 13px; }
    .pop-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .pop-ph {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 17px; color: #fff;
    }
    .pop-name { font-weight: 600; color: #fff; font-size: 13px; }
    .pop-loc  { font-size: 11px; color: #80848e; margin-top: 2px; }
    body.light .pop-name { color: #111; }
    body.light .pop-loc  { color: #888; }

    #dbg {
      position: fixed; bottom: 8px; left: 8px; right: 8px; z-index: 999;
      font-family: monospace; font-size: 11px; color: #b5bac1;
      background: rgba(0,0,0,0.7); border-radius: 6px; padding: 6px;
      white-space: pre-wrap; max-height: 30vh; overflow-y: auto;
      pointer-events: none; display: none;
    }
  </style>
</head>
<body>

<header>
  {% if guild_icon %}
  <img class="guild-icon" src="{{ guild_icon }}" alt="" />
  {% else %}
  <div class="guild-icon-placeholder">{{ guild_name[0] | upper }}</div>
  {% endif %}
  <div>
    <h1>{{ guild_name }}</h1>
    <span class="sub">Member Map</span>
  </div>
  <div class="spacer"></div>
  <span class="pill" id="pin-pill">{{ pin_count }} pin{{ '' if pin_count == 1 else 's' }}</span>
  <button id="mode-btn" onclick="toggleMode()">☀️ Light</button>
</header>

<div id="map"></div>
<pre id="dbg"></pre>

<script>
// ── Debug overlay (toggle with Ctrl+D) ───────────────────────────────────────
let dbgVisible = false;
const dbgEl = document.getElementById('dbg');
function dbg(s) {
  console.log('[map]', s);
  dbgEl.textContent += s + '\n';
}
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'd') { e.preventDefault(); dbgVisible = !dbgVisible; dbgEl.style.display = dbgVisible ? 'block' : 'none'; }
});

// ── Config ───────────────────────────────────────────────────────────────────
const GUILD_ID = "{{ guild_id }}";
const REGION   = {{ region | tojson }};

dbg(`MapLibre ${maplibregl.version} | guild=${GUILD_ID} | region=${REGION}`);

const STYLES = {
  dark:  'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  light: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
};

// [west, south, east, north]
const REGION_BOUNDS = {
  world:         [[-170,-70],[180,75]],
  europe:        [[-25,34],[45,72]],
  germany:       [[5,47],[16,56]],
  france:        [[-5,41],[10,52]],
  spain:         [[-10,35],[5,44]],
  italy:         [[6,36],[19,48]],
  poland:        [[14,49],[25,55]],
  netherlands:   [[3,50],[8,54]],
  belgium:       [[2,49],[7,52]],
  austria:       [[9,46],[18,49]],
  czech:         [[12,48],[19,52]],
  hungary:       [[16,45],[23,49]],
  portugal:      [[-10,36],[-6,42]],
  greece:        [[19,34],[28,42]],
  sweden:        [[10,55],[25,70]],
  norway:        [[4,57],[32,72]],
  denmark:       [[8,54],[16,58]],
  finland:       [[19,59],[32,71]],
  romania:       [[21,43],[30,48]],
  bulgaria:      [[22,41],[29,44]],
  croatia:       [[13,42],[20,47]],
  switzerland:   [[5,45],[11,48]],
  ukraine:       [[22,44],[40,53]],
  unitedkingdom: [[-10,49],[3,61]],
  japan:         [[129,30],[146,46]],
  southkorea:    [[125,33],[130,39]],
  asia:          [[25,-10],[150,60]],
  northamerica:  [[-170,15],[-50,75]],
  southamerica:  [[-82,-57],[-34,15]],
  africa:        [[-20,-36],[52,38]],
  australia:     [[112,-45],[155,-10]],
  usmainland:    [[-125,24],[-65,50]],
  brazil:        [[-74,-34],[-34,6]],
  canada:        [[-141,42],[-52,84]],
  mexico:        [[-118,14],[-86,33]],
};

let isDark = true;

dbg('MapLibre ' + maplibregl.version);

const map = new maplibregl.Map({
  container: 'map',
  style: STYLES.dark,
  center: [10, 30],
  zoom: 2,
});

map.on('error', e => dbg('MAP ERROR: ' + (e.error?.message || JSON.stringify(e))));

let pinsLoaded = false;
let cachedFeatures = null;

map.on('style.load', () => {
  dbg('style.load — setting globe');
  map.setProjection({ type: 'globe' });

  // Atmosphere halo so the sphere reads as a 3D globe in space.
  // Best-effort: older MapLibre builds ignore/omit setSky — never let it break the map.
  try { map.setSky({ 'atmosphere-blend': 0.85 }); }
  catch (e) { dbg('setSky skipped: ' + e); }

  if (!pinsLoaded) {
    pinsLoaded = true;
    const b = REGION_BOUNDS[REGION] || REGION_BOUNDS.world;
    // Cap the zoom so the view always stays a curved globe — MapLibre flattens to
    // mercator past ~z6, which would otherwise happen for small-country regions.
    // Users can still zoom in manually afterwards.
    map.fitBounds(b, { padding: 60, maxZoom: 3.2, duration: 0 });
    loadPins();
  } else if (cachedFeatures) {
    // Re-add layers after style swap (setStyle clears all sources/layers/images)
    addPinLayers(cachedFeatures);
  }
});

// ── Marker image helpers ──────────────────────────────────────────────────────
// Each pin is a 68px canvas (displayed at 34px via pixelRatio:2).
// Canvas → createImageBitmap() → map.addImage() — the only type MapLibre v5 accepts.

const MARKER_PX = 68;
const bitmapCache = {}; // user_id+avatar_hash → ImageBitmap

function drawInitialCanvas(letter, color) {
  const c = document.createElement('canvas');
  c.width = c.height = MARKER_PX;
  const ctx = c.getContext('2d');
  const r = MARKER_PX / 2;
  ctx.beginPath(); ctx.arc(r, r, r - 2, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(r * 0.8)}px system-ui, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(letter, r, r + 1);
  return c;
}

function drawAvatarCanvas(img) {
  const c = document.createElement('canvas');
  c.width = c.height = MARKER_PX;
  const ctx = c.getContext('2d');
  const r = MARKER_PX / 2;
  ctx.beginPath(); ctx.arc(r, r, r - 1, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.arc(r, r, r - 4, 0, Math.PI * 2); ctx.clip();
  ctx.drawImage(img, 4, 4, MARKER_PX - 8, MARKER_PX - 8);
  ctx.restore();
  return c;
}

async function getPinBitmap(f) {
  const { username, color, avatar_hash, user_id } = f.properties;
  const key = `${user_id}-${avatar_hash || ''}`;
  if (bitmapCache[key]) return bitmapCache[key];

  let canvas;
  if (avatar_hash && avatar_hash !== 'null') {
    canvas = await new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(drawAvatarCanvas(img));
      img.onerror = () => resolve(null);
      img.src = `https://cdn.discordapp.com/avatars/${user_id}/${avatar_hash}.png?size=64`;
    });
  }
  if (!canvas) {
    canvas = drawInitialCanvas((username || '?')[0].toUpperCase(), color || '#5865F2');
  }

  const bitmap = await createImageBitmap(canvas);
  bitmapCache[key] = bitmap;
  return bitmap;
}

// ── Pin layer management ──────────────────────────────────────────────────────
let listenersAdded = false;

async function addPinLayers(features) {
  // Load bitmaps for all pins, register in map sprite
  await Promise.all(features.map(async f => {
    const id = f.properties.imageId;
    if (!map.hasImage(id)) {
      map.addImage(id, await getPinBitmap(f), { pixelRatio: 2 });
    }
  }));

  const geojson = { type: 'FeatureCollection', features };
  if (map.getSource('pins')) {
    map.getSource('pins').setData(geojson);
    return;
  }

  map.addSource('pins', { type: 'geojson', data: geojson });
  map.addLayer({
    id: 'pins-symbols',
    type: 'symbol',
    source: 'pins',
    layout: {
      'icon-image': ['get', 'imageId'],
      'icon-size': 1,
      'icon-allow-overlap': true,
      'icon-ignore-placement': true,
    },
  });

  if (!listenersAdded) {
    listenersAdded = true;
    const popup = new maplibregl.Popup({ offset: 20, closeButton: true, maxWidth: '260px' });

    map.on('click', 'pins-symbols', e => {
      const { name, username, color, avatar_hash, user_id } = e.features[0].properties;
      const [lng, lat] = e.features[0].geometry.coordinates;
      const hasAvatar = avatar_hash && avatar_hash !== 'null';
      const avatarHtml = hasAvatar
        ? `<img class="pop-avatar" src="https://cdn.discordapp.com/avatars/${user_id}/${avatar_hash}.png?size=64" alt="">`
        : `<div class="pop-ph" style="background:${color}">${esc((username||'?')[0].toUpperCase())}</div>`;
      popup.setLngLat([lng, lat])
        .setHTML(`<div class="pop-inner">${avatarHtml}<div><div class="pop-name">${esc(username)}</div><div class="pop-loc">${esc(name)}</div></div></div>`)
        .addTo(map);
    });
    map.on('mouseenter', 'pins-symbols', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'pins-symbols', () => { map.getCanvas().style.cursor = ''; });
  }
}

// ── Fetch pins ────────────────────────────────────────────────────────────────
async function loadPins() {
  dbg('loadPins...');
  try {
    const data = await fetch(`/api/map/${GUILD_ID}/pins`).then(r => r.json());
    const features = data.features || [];
    dbg('pins: ' + features.length);
    document.getElementById('pin-pill').textContent =
      `${features.length} pin${features.length !== 1 ? 's' : ''}`;
    for (const f of features)
      f.properties.imageId = `pin-${f.properties.user_id}`;
    cachedFeatures = features;
    await addPinLayers(features);
    dbg('pins rendered');
  } catch(err) { dbg('loadPins FAIL: ' + err); }
}

function toggleMode() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('mode-btn').textContent = isDark ? '☀️ Light' : '🌙 Dark';
  map.setStyle(isDark ? STYLES.dark : STYLES.light);
  // style.load fires → globe + pins re-applied automatically
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
</script>
</body>
</html>
